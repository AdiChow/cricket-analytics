spring:
  application:
    name: cricket-analytics

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cricketdb}
    username: ${DB_USERNAME:cricket}
    password: ${DB_PASSWORD:cricket}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}

    show-sql: ${JPA_SHOW_SQL:true}

server:
  port: ${PORT:8080}

cricket:
  import-on-startup: ${CRICKET_IMPORT_ON_STARTUP:false}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  cors:
    allowed-origins: http://localhost:5173
    deployed-origins: ${CORS_ALLOWED_ORIGINS:}
