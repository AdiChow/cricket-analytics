spring:
  application:
    name: cricket-analytics

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cricketdb}
    username: ${DB_USERNAME:cricket}
    password: ${DB_PASSWORD:cricket}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}

    show-sql: ${JPA_SHOW_SQL:true}

server:
  port: ${PORT:8080}

cricket:
  import-on-startup: ${CRICKET_IMPORT_ON_STARTUP:false}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  cors:
    allowed-origins: http://localhost:5173
    deployed-origins: ${CORS_ALLOWED_ORIGINS:}
  ai:
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-5.4-mini}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    connect-timeout: ${AI_CONNECT_TIMEOUT:3s}
    read-timeout: ${AI_READ_TIMEOUT:15s}
    max-output-tokens: ${AI_MAX_OUTPUT_TOKENS:300}
