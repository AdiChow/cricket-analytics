spring:
  application:
    name: cricket-analytics

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cricketdb}
    username: ${DB_USERNAME:cricket}
    password: ${DB_PASSWORD:cricket}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

cricket:
  import-on-startup: ${CRICKET_IMPORT_ON_STARTUP:false}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
