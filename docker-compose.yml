services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cricketdb}
      POSTGRES_USER: ${POSTGRES_USER:-cricket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cricket}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cricket-analytics:local
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cricketdb}
      DB_USERNAME: ${POSTGRES_USER:-cricket}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-cricket}
      CRICKET_IMPORT_ON_STARTUP: "false"
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
